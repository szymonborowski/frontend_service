apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: portfolio
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: portfolio
data:
  APP_NAME: "Frontend"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://borowski.services"
  LOG_CHANNEL: "stderr"
  DB_CONNECTION: "mysql"
  DB_HOST: "frontend-mysql"
  DB_PORT: "3306"
  REDIS_HOST: "frontend-redis"
  REDIS_PORT: "6379"
  # Session and cache configuration
  SESSION_DRIVER: "redis"
  SESSION_CONNECTION: "default"
  CACHE_DRIVER: "redis"
  # Internal service-to-service URLs (Kubernetes DNS)
  BLOG_API_URL_INTERNAL: "http://blog"
  USERS_API_URL_INTERNAL: "http://users"
  SSO_API_URL_INTERNAL: "http://sso"
  SSO_INTERNAL_URL: "http://sso"
  SSO_REDIRECT_URI: "https://borowski.services/oauth/callback"
  # External SSO URL (for browser redirects)
  SSO_URL: "https://sso.borowski.services"
  # OAuth credentials (generate proper values in production)
  SSO_CLIENT_ID: "frontend-client"
  SSO_CLIENT_SECRET: "frontend-secret-change-in-production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: portfolio
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: nginx
    app.kubernetes.io/part-of: portfolio
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Health probes dla Kubernetes
        location = /health { return 200 "ok\n"; add_header Content-Type text/plain; }
        location = /ready  { return 200 "ok\n"; add_header Content-Type text/plain; }

        # Vite build assets (fingerprinted filenames -- long cache)
        location /build/ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files  $uri =404;
        }

        # Livewire dynamic assets (served by PHP, not static files)
        location ~ ^/livewire- {
            try_files $uri /index.php?$query_string;
        }

        # Static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires    30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
            try_files  $uri =404;
        }

        # Laravel front controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM (sidecar -- same pod network namespace)
        location ~ \.php$ {
            fastcgi_pass            127.0.0.1:9000;
            fastcgi_index           index.php;
            include                 fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   $realpath_root;
            fastcgi_buffers         16 16k;
            fastcgi_buffer_size     32k;
            fastcgi_read_timeout    60s;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
