apiVersion: v1
kind: Secret
metadata:
  name: frontend-mysql-secret
  namespace: portfolio
  labels:
    app.kubernetes.io/name: frontend-mysql
    app.kubernetes.io/part-of: portfolio
type: Opaque
stringData:
  MYSQL_DATABASE: "frontend"
  MYSQL_USER: "frontend"
  MYSQL_PASSWORD: "EozqUvmis1UVdAfr9E0OfIIsdSfJXY6feyUFDfTKJvk="
  MYSQL_ROOT_PASSWORD: "EozqUvmis1UVdAfr9E0OfIIsdSfJXY6feyUFDfTKJvk="
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-mysql
  namespace: portfolio
  labels:
    app.kubernetes.io/name: frontend-mysql
    app.kubernetes.io/part-of: portfolio
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    app.kubernetes.io/name: frontend-mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: frontend-mysql
  namespace: portfolio
  labels:
    app.kubernetes.io/name: frontend-mysql
    app.kubernetes.io/part-of: portfolio
spec:
  serviceName: frontend-mysql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-mysql
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mysql
          image: mysql:8
          args:
            - --innodb-buffer-pool-size=32M
          ports:
            - containerPort: 3306
              name: mysql
          envFrom:
            - secretRef:
                name: frontend-mysql-secret
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 120
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
