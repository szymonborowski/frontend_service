apiVersion: v1
kind: Service
metadata:
  name: frontend-qdrant
  namespace: portfolio
  labels:
    app.kubernetes.io/name: frontend-qdrant
    app.kubernetes.io/part-of: portfolio
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
  selector:
    app.kubernetes.io/name: frontend-qdrant
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: frontend-qdrant
  namespace: portfolio
  labels:
    app.kubernetes.io/name: frontend-qdrant
    app.kubernetes.io/part-of: portfolio
spec:
  serviceName: frontend-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-qdrant
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.14.1
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          livenessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
